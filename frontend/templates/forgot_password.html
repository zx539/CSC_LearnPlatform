<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找回密码 - 个性化学习多智能体系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="bg"></div>
  <main class="login-page">
    <section class="card login-card">
      <h1>🔑 忘记密码</h1>
      <p>输入用户名后，回答 3 个密保问题即可重置密码。</p>
      <label>
        用户名
        <input id="fpUsername" placeholder="请输入用户名" />
      </label>
      <div class="actions">
        <button id="loadQuestionsBtn" class="btn-secondary" type="button">获取密保问题</button>
      </div>
      <div id="fpQuestionsWrap" class="hidden-by-gate">
        <div id="fpQuestions"></div>
        <label>
          新密码（至少6位）
          <input id="fpNewPassword" type="password" placeholder="请输入新密码" />
        </label>
        <div class="actions">
          <button id="resetPasswordBtn" class="btn-primary" type="button">重置密码</button>
        </div>
      </div>
      <p id="fpStatus" class="status">请先获取密保问题。</p>
      <div class="actions">
        <a class="btn-light" href="/login">← 返回登录</a>
      </div>
    </section>
  </main>
  <script>
    const statusEl = document.getElementById("fpStatus");
    const usernameEl = document.getElementById("fpUsername");
    const questionsWrapEl = document.getElementById("fpQuestionsWrap");
    const questionsEl = document.getElementById("fpQuestions");
    const newPasswordEl = document.getElementById("fpNewPassword");
    const loadQuestionsBtn = document.getElementById("loadQuestionsBtn");
    const resetPasswordBtn = document.getElementById("resetPasswordBtn");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function renderQuestions(questions) {
      questionsEl.innerHTML = questions
        .map(
          (question, idx) => `
          <label>
            问题 ${idx + 1}：${String(question || "")}
            <input class="fp-answer" data-index="${idx}" placeholder="请输入答案" />
          </label>
        `,
        )
        .join("");
    }

    loadQuestionsBtn.addEventListener("click", async () => {
      const username = usernameEl.value.trim();
      if (!username) {
        setStatus("请输入用户名。");
        return;
      }
      setStatus("正在加载密保问题...");
      try {
        const resp = await fetch("/api/auth/security-questions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username }),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || "获取密保问题失败");
        renderQuestions(data.questions || []);
        questionsWrapEl.classList.remove("hidden-by-gate");
        setStatus("请回答全部问题后设置新密码。");
      } catch (err) {
        questionsWrapEl.classList.add("hidden-by-gate");
        setStatus(`获取失败：${err.message}`);
      }
    });

    resetPasswordBtn.addEventListener("click", async () => {
      const username = usernameEl.value.trim();
      const newPassword = newPasswordEl.value.trim();
      const answers = Array.from(document.querySelectorAll(".fp-answer")).map((node) => node.value.trim());
      if (!username || !newPassword || answers.length !== 3 || answers.some((item) => !item)) {
        setStatus("请填写用户名、3个密保答案和新密码。");
        return;
      }
      setStatus("正在重置密码...");
      try {
        const resp = await fetch("/api/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, answers, new_password: newPassword }),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || "重置失败");
        setStatus("密码已重置，正在返回登录页...");
        setTimeout(() => {
          window.location.href = "/login";
        }, 1200);
      } catch (err) {
        setStatus(`重置失败：${err.message}`);
      }
    });
  </script>
</body>
</html>
