<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个性化学习多智能体系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="bg"></div>
  <main class="page">
    <header class="hero">
      <h1>🌟 个性化学习多智能体系统</h1>
      <p>星火大模型驱动 · 标签页交互 · 明亮活泼 UI</p>
      <div class="user-bar">
        <span>👤 {{ username }}</span>
        <a class="logout-link" href="/logout">退出登录</a>
      </div>
      {% if notice %}
      <p class="notice">{{ notice }}</p>
      {% endif %}
    </header>

    <section class="layout">
      <div class="left-col">
        <section id="projectCard" class="card">
          <h2>学习项目选择</h2>
          <div class="grid">
            <label>
              已有学习项目
              <select id="projectSelect"></select>
            </label>
            <label>
              选择操作
              <input id="projectHint" value="先选择“已有项目”或“新建项目”" disabled />
            </label>
          </div>
          <div class="actions">
            <button id="chooseExistingBtn" class="btn-secondary">使用已有项目并填写进度</button>
            <button id="chooseNewBtn" class="btn-primary">新建学习项目</button>
            <span id="projectStatus" class="status">请先选择学习项目</span>
          </div>
        </section>

        <section id="taskCard" class="card form-card">
          <h2>任务输入</h2>
          <div class="grid">
            <label>
              课程名称 *
              <input id="course" placeholder="如：人工智能导论" />
            </label>
            <label>
              学习主题 *
              <input id="topic" placeholder="如：机器学习基础" />
            </label>
            <label>
              模型名称
              <input id="model" value="4.0Ultra" />
            </label>
            <label>
              学习进度填写
              <input id="progressHint" value="请在下方“学习进度填写”模块提交（每次登录至少1次）" disabled />
            </label>
          </div>

          <label class="full">
            画像对话输入 *
            <textarea id="dialogue" rows="4" placeholder="如：我是大二计算机学生，线代薄弱，偏好图解与代码练习，每周可投入8小时..."></textarea>
          </label>

          <div class="actions">
            <button id="generateBtn" class="btn-primary">🚀 生成个性化学习方案</button>
            <span id="status" class="status">等待输入</span>
          </div>
        </section>

        <section id="progressCard" class="card progress-card">
          <h2>学习进度填写（每次登录至少 1 次）</h2>
          <div id="progressNotice" class="status">尚未加载进度表单</div>
          <div id="progressFormWrap" class="progress-form-wrap"></div>
          <div class="actions">
            <button id="submitProgressBtn" class="btn-secondary">📝 提交学习进度并更新评估</button>
          </div>
        </section>

        <section id="resultCard" class="card">
          <nav class="tabs">
            <button class="tab active" data-tab="profile">学习画像</button>
            <button class="tab" data-tab="aiMarkdown">AI返回(MD)</button>
            <button class="tab" data-tab="resources">学习资源</button>
            <button class="tab" data-tab="path">学习路径</button>
            <button class="tab" data-tab="evaluate">学习评估</button>
            <button class="tab" data-tab="tutor">智能辅导</button>
          </nav>

          <div class="tab-panels">
            <section id="profile" class="panel active"></section>
            <section id="aiMarkdown" class="panel"></section>
            <section id="resources" class="panel"></section>
            <section id="path" class="panel"></section>
            <section id="evaluate" class="panel"></section>
            <section id="tutor" class="panel">
              <div class="tutor-wrap">
                <textarea id="question" rows="3" placeholder="输入学习中遇到的问题..."></textarea>
                <button id="askBtn" class="btn-secondary">提问</button>
                <article id="tutorAnswer" class="answer"></article>
              </div>
            </section>
          </div>
        </section>
      </div>
      <aside id="historyCard" class="card history-card">
        <h2>历史记录</h2>
        <div id="historyList" class="history-list"></div>
      </aside>
    </section>
  </main>

  <div id="loadingModal" class="loading-modal hidden-by-gate" aria-live="polite" aria-busy="true">
    <div class="loading-modal-content">
      <div class="loading-spinner"></div>
      <p id="loadingText">正在请求星火 AI，请稍候...</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
