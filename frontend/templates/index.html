<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个性化学习多智能体系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="bg"></div>
  <main class="page">
    <header class="hero">
      <h1>🌟 个性化学习多智能体系统</h1>
      <p>星火大模型驱动 · 标签页交互 · 明亮活泼 UI</p>
      <div class="user-bar">
        <span>👤 {{ username }}</span>
        <a class="logout-link" href="/logout">退出登录</a>
      </div>
      {% if notice %}
      <p class="notice">{{ notice }}</p>
      {% endif %}
    </header>

    <section id="mainLayout" class="layout project-centered">
      <div class="left-col">
        <section id="projectCard" class="card project-card">
          <h2>学习项目选择</h2>
          <p class="muted-text">请选择已有学习项目或新建项目，已完成进度问卷的项目可直接进入学习页面。</p>
          <div id="projectList" class="history-list project-list"></div>
          <div class="actions">
            <button id="chooseExistingBtn" class="btn-secondary">进入已选学习项目</button>
            <button id="chooseNewBtn" class="btn-primary">新建学习项目</button>
            <span id="projectStatus" class="status">请先选择学习项目</span>
          </div>
        </section>

        <section id="taskCard" class="card form-card">
          <h2>任务输入</h2>
          <div class="grid">
            <label>
              课程名称 *
              <input id="course" placeholder="如：人工智能导论" />
            </label>
            <label>
              学习主题 *
              <input id="topic" placeholder="如：机器学习基础" />
            </label>
            <label>
              模型名称
              <select id="model">
                <option value="4.0Ultra">星火 4.0Ultra（质量优先）</option>
                <option value="lite">星火 Lite（速度优先）</option>
              </select>
            </label>
            <label>
              学习进度填写
              <input id="progressHint" value="每个学习项目仅需提交一次进度问卷，之后可直接进入学习页面" disabled />
            </label>
          </div>

          <label class="full">
            画像对话输入 *
            <textarea id="dialogue" rows="4" placeholder="如：我是大二计算机学生，线代薄弱，偏好图解与代码练习，每周可投入8小时..."></textarea>
          </label>

          <div class="actions">
            <button id="backFromTaskBtn" class="btn-light" type="button">← 返回项目选择</button>
            <button id="generateBtn" class="btn-primary">🚀 生成个性化学习方案</button>
            <span id="status" class="status">等待输入</span>
          </div>
        </section>

        <section id="progressCard" class="card progress-card">
          <h2>学习进度填写</h2>
          <div id="progressNotice" class="status">尚未加载进度表单</div>
          <div id="progressFormWrap" class="progress-form-wrap"></div>
          <div class="actions">
            <button id="backFromProgressBtn" class="btn-light" type="button">← 返回项目选择</button>
            <button id="submitProgressBtn" class="btn-secondary">📝 提交学习进度并更新评估</button>
            <button id="submitTestBtn" class="btn-primary hidden-by-gate">✅ 提交测试问卷并更新进度/测试问卷</button>
            <button id="skipTestBtn" class="btn-light hidden-by-gate" type="button">跳过测试问卷（保持当前测试问卷）</button>
          </div>
        </section>

        <section id="resultCard" class="card">
          <div class="actions result-head-actions">
            <button id="backFromResultBtn" class="btn-light" type="button">← 返回项目选择</button>
            <button id="openTestSurveyBtn" class="btn-light" type="button">🧪 填写测试问卷（可选）</button>
            <button id="openTutorWidgetInlineBtn" class="btn-secondary" type="button">💬 打开智能辅导</button>
          </div>
          <nav id="resultTabs" class="tabs">
            <button class="tab active" data-tab="profile">学习画像</button>
            <button class="tab" data-tab="resources_panel">学习资源</button>
            <button class="tab" data-tab="path">学习路径</button>
            <button class="tab" data-tab="evaluate">学习评估</button>
          </nav>

          <div class="tab-panels">
            <section id="profile" class="panel active"></section>
            <section id="resources_panel" class="panel"></section>
            <section id="path" class="panel"></section>
            <section id="evaluate" class="panel"></section>
          </div>
        </section>
      </div>
    </section>
  </main>

  <button id="tutorToggleFab" class="tutor-fab hidden-by-gate" type="button">💬 智能辅导</button>
  <section id="tutorWidget" class="tutor-widget hidden-by-gate">
    <header id="tutorWidgetHeader" class="tutor-widget-header">
      <strong>智能辅导助手</strong>
      <div class="tutor-widget-actions">
        <button id="tutorWidgetMinBtn" class="btn-light tutor-mini-btn" type="button">最小化</button>
        <button id="tutorWidgetCloseBtn" class="btn-light tutor-mini-btn" type="button">隐藏</button>
      </div>
    </header>
    <div class="tutor-widget-body">
      <div class="tutor-memory-bar">
        <span id="tutorMemoryStatus" class="muted-text">当前记忆：0 条</span>
        <button id="clearTutorMemoryBtn" class="btn-light tutor-mini-btn" type="button">清除记忆</button>
      </div>
      <section id="tutorHistory" class="tutor-history"></section>
      <div class="tutor-input-wrap">
        <textarea id="question" rows="3" placeholder="输入学习中遇到的问题..."></textarea>
        <button id="askBtn" class="btn-secondary" type="button">提问</button>
      </div>
      <p id="tutorHint" class="status">可查看并延续之前的会话记忆。</p>
    </div>
  </section>

  <div id="loadingModal" class="loading-modal hidden-by-gate" aria-live="polite" aria-busy="true">
    <div class="loading-modal-content">
      <div class="loading-spinner"></div>
      <p id="loadingText">正在请求星火 AI，请稍候...</p>
      <button id="cancelRequestBtn" class="btn-light hidden-by-gate" type="button">取消请求</button>
    </div>
  </div>

  <footer class="site-footer">
    <a href=" " target="_blank" rel="noopener noreferrer">苏ICP备2026023620</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/highlight.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
