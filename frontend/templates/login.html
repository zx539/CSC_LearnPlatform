<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 个性化学习多智能体系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="bg"></div>
  <main class="login-page">
    <section class="card login-card">
      <h1>🔐 登录系统</h1>
      <p>首次登录会自动创建账号，数据将保存在你的专属用户文件夹。</p>
      {% if error %}
      <p class="error-text">{{ error }}</p>
      {% endif %}
      <form method="post" action="/login" class="login-form">
        <label>
          用户名
          <input name="username" placeholder="请输入用户名" required />
        </label>
        <label>
          密码
          <input name="password" type="password" placeholder="请输入密码" required />
        </label>
        <button type="submit" class="btn-primary">进入系统</button>
      </form>
    </section>
  </main>
  <footer class="site-footer">
    <a href=" " target="_blank" rel="noopener noreferrer">苏ICP备2026023620</a>
  </footer>
</body>
</html>
